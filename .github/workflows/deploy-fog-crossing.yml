name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Fog Crossing dependencies
        working-directory: Fog Crossing
        run: npm install

      - name: Build Fog Crossing
        working-directory: Fog Crossing
        run: npm run build

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r "Fog Crossing/dist" "site/Fog Crossing"
          cp -r Pacoom site/Pacoom
          cp -r freemium site/freemium
          cp -r freemium2 site/freemium2

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
