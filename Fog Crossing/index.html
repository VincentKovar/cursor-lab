<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <title>Fog Crossing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d10;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Courier New', ui-monospace, monospace;
    }
    #game { position: fixed; inset: 0; touch-action: none; display: block; }

    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 0.9s ease;
      z-index: 10;
    }
    .overlay.hidden { opacity: 0; }

    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 5;
      background: radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(5,2,2,0.85) 100%);
      opacity: 0.45; transition: opacity 0.8s ease;
    }
    #redpulse {
      position: fixed; inset: 0; pointer-events: none; z-index: 6;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(90,10,5,0.5) 100%);
      opacity: 0; transition: opacity 0.5s ease;
    }

    #title h1, #death h1 {
      font-size: clamp(26px, 7.6vw, 58px);
      font-weight: 400;
      letter-spacing: 0.22em;
      padding-left: 0.22em; /* optically recenter tracked text */
      color: #f2f5fb;
      text-shadow: 0 0 20px rgba(190,200,220,0.55), 0 0 60px rgba(150,80,68,0.28);
      text-align: center;
      margin-bottom: 0.4em;
    }
    #death h1 { color: #9a6258; text-shadow: 0 0 20px rgba(150,60,40,0.5); }
    .sub {
      color: #c3c8d2; font-size: clamp(13px, 3.6vw, 17px);
      letter-spacing: 0.18em; text-align: center; line-height: 2;
      animation: breathe 2.6s ease-in-out infinite;
    }
    .hint { color: #939aa4; font-size: clamp(11px, 3vw, 13px); letter-spacing: 0.1em; margin-top: 2.2em; line-height: 1.9; text-align:center; }
    @keyframes breathe { 0%,100% { opacity: 0.62; } 50% { opacity: 1; } }

    #hud {
      position: fixed; top: max(14px, env(safe-area-inset-top)); left: 0; right: 0;
      text-align: center; pointer-events: none; z-index: 8;
      color: #8d939c; font-size: 22px; letter-spacing: 0.35em;
      text-shadow: 0 0 12px rgba(150,160,180,0.3);
      opacity: 0; transition: opacity 0.6s;
    }
    #death .stat { color: #7d838c; font-size: 16px; letter-spacing: 0.2em; margin: 0.35em 0; text-align: center; padding: 0 24px; }
    #rotate {
      position: fixed; inset: 0; z-index: 50; background: #0d0d10;
      display: none; align-items: center; justify-content: center;
      color: #7d838c; letter-spacing: 0.2em; font-size: 15px; text-align: center;
    }
    @media (orientation: portrait) and (max-width: 600px) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="vignette"></div>
  <div id="redpulse"></div>
  <div id="hud">0</div>

  <div id="title" class="overlay">
    <h1>FOG&nbsp;CROSSING</h1>
    <div class="sub">tap to step into the fog</div>
    <div class="hint">
      TAP — step forward<br/>
      SWIPE — hop left / right / back<br/>
      HOLD — peer into the dark<br/><br/>
      the fog behind you is not empty
    </div>
  </div>

  <div id="death" class="overlay hidden">
    <h1>TAKEN</h1>
    <div class="stat" id="deathCause"></div>
    <div class="stat" id="deathDepth"></div>
    <div class="stat" id="deathBest"></div>
    <div class="sub" style="margin-top:2em">tap to rise again</div>
  </div>

  <div id="rotate">turn your device sideways<br/>the fog waits in the wide dark</div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
