<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PACOOM</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div id="helmet-frame"></div>
    <div id="vignette"></div>
    <div id="damage-flash"></div>
    <div id="power-flash"></div>
    <div id="crosshair">
      <div class="ch-line ch-t"></div><div class="ch-line ch-b"></div>
      <div class="ch-line ch-l"></div><div class="ch-line ch-r"></div>
      <div class="ch-dot"></div>
    </div>

    <div id="minimap-wrap">
      <canvas id="minimap" width="220" height="220"></canvas>
      <div class="hud-label">TACTICAL</div>
    </div>

    <div id="health-panel" class="hud-panel">
      <div class="hud-label">HEALTH</div>
      <div id="health-value">100%</div>
      <div id="health-bar"><div id="health-fill"></div></div>
    </div>

    <div id="score-panel" class="hud-panel">
      <div class="hud-label">PELLETS REMAINING</div>
      <div id="pellet-count">0</div>
      <div class="hud-label" style="margin-top:8px">SCORE</div>
      <div id="score-value">0</div>
    </div>

    <div id="power-timer" class="hidden">
      <div class="hud-label">DEMON PURGE</div>
      <div id="power-bar"><div id="power-fill"></div></div>
    </div>

    <div id="msg-flash"></div>
  </div>

  <!-- Screens -->
  <div id="title-screen" class="screen">
    <h1 class="glitch" data-text="PACOOM">PACOOM</h1>
    <p class="tagline">RIP &amp; CHOMP &nbsp;//&nbsp; THE MAZE HUNGERS</p>
    <div class="instructions">
      <span><b>WASD</b> MOVE</span>
      <span><b>MOUSE</b> LOOK</span>
      <span><b>CLICK</b> FIRE</span>
      <span><b>SHIFT</b> SPRINT</span>
    </div>
    <button id="start-btn">ENTER THE MAZE</button>
    <p class="hint">Collect all plasma spheres. Grab a Plasma Core to purge the demons.</p>
  </div>

  <div id="end-screen" class="screen hidden">
    <h1 id="end-title">YOU DIED</h1>
    <p id="end-stats"></p>
    <button id="restart-btn">RE-ENTER THE MAZE</button>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
